<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Movie picker</title>
    <link rel="icon" type="image/x-icon" href="./img/ribbon.png" />
  </head>
  <body>
    <main
      class="bg-[url(./img/cinema-hall.webp)] bg-center bg-no-repeat bg-cover bg-black/30 bg-blend-multiply w-screen min-h-screen px-4 pt-15 pb-10"
    >
      <div class="text-lime-300/50 absolute top-4 right-7">
        <a href="../../index.html"><b>&lt;&equals;&equals; back to home works</b></a>
      </div>
      <form class="flex justify-center gap-4" name="movie-form">
        <div class="relative flex gap-1 max-w-90">
          <input
            type="search"
            id="movie-title"
            placeholder="Enter movie title"
            class="p-2 rounded-md text-gray-300 bg-slate-700/40 w-full text-center"
            name="query"
            enterkeyhint="search"
            inputmode="search"
            autocomplete="off"
          />
          <button
            class="bg-blue-500 min-[1024px]:hover:bg-blue-700 active:bg-blue-800 text-white font-bold flex items-center justify-center gap-2 py-2 px-4 rounded-md cursor-pointer transition-colors"
          >
            <svg
              class="w-4 h-4 fill-current"
              viewBox="0 0 16 16"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
            >
              <rect width="16" height="16" id="icon-bound" fill="none" />
              <path
                d="M15.708,13.587l-3.675-3.675C12.646,8.92,13,7.751,13,6.5C13,2.91,10.09,0,6.5,0S0,2.91,0,6.5S2.91,13,6.5,13 c1.251,0,2.42-0.354,3.412-0.967l3.675,3.675c0.389,0.389,1.025,0.389,1.414,0l0.707-0.707 C16.097,14.612,16.097,13.976,15.708,13.587z M3.318,9.682C2.468,8.832,2,7.702,2,6.5s0.468-2.332,1.318-3.182S5.298,2,6.5,2 s2.332,0.468,3.182,1.318C10.532,4.168,11,5.298,11,6.5s-0.468,2.332-1.318,3.182C8.832,10.532,7.702,11,6.5,11 S4.168,10.532,3.318,9.682z"
              />
            </svg>
            <span class="hidden md:inline">Search</span>
          </button>
          <div
            id="search-suggestions"
            class="absolute left-0 right-0 top-[3rem] bg-slate-800/95 border border-slate-700 rounded-md shadow-2xl hidden z-5 max-h-60 overflow-y-auto"
          ></div>
        </div>
      </form>
      <div
        id="movie-info"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-6xl mx-auto mt-10 px-4 pb-12"
      ></div>
      <template id="movie-card-template">
        <div
          class="flex flex-col bg-slate-800/80 backdrop-blur-md rounded-lg overflow-hidden shadow-2xl border border-slate-700/50 hover:scale-105 transition-transform duration-300"
        >
          <div class="h-80 overflow-hidden bg-slate-950 flex items-center justify-center">
            <img
              class="movie-poster w-full h-full object-cover"
              loading="lazy"
              alt="Movie Poster"
            />
          </div>
          <div class="p-4 flex flex-col flex-grow justify-between gap-4">
            <h3 class="movie-title text-lg font-bold text-white line-clamp-2"></h3>
            <div class="flex justify-between items-center text-sm text-gray-400">
              <span
                class="movie-type bg-slate-700 px-2.5 py-1 rounded text-xs font-semibold text-gray-200 uppercase tracking-wider"
              ></span>
              <span class="movie-year flex items-center gap-1"></span>
            </div>
          </div>
        </div>
      </template>
    </main>
    <script src="scripts/main.js"></script>
  </body>
</html>
